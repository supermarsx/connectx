<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient (diagonal pink→purple) -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB6C9"/>
      <stop offset="100%" stop-color="#C9B6FF"/>
    </linearGradient>

    <!-- Disc gradients for 3D depth -->
    <radialGradient id="disc-pink" cx="0.35" cy="0.3" r="0.65">
      <stop offset="0%" stop-color="#FF9AC8"/>
      <stop offset="100%" stop-color="#FF6FAF"/>
    </radialGradient>
    <radialGradient id="disc-mint" cx="0.35" cy="0.3" r="0.65">
      <stop offset="0%" stop-color="#8EECD8"/>
      <stop offset="100%" stop-color="#64E0C6"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background with dark border -->
  <rect x="6" y="6" width="500" height="500" rx="96" ry="96"
        fill="url(#bg)" stroke="#17171F" stroke-width="6"/>

  <!-- Disc 1 (pink) — bottom-left -->
  <circle cx="160" cy="340" r="60" fill="url(#disc-pink)" stroke="#17171F" stroke-width="7"/>
  <circle cx="148" cy="324" r="20" fill="white" opacity="0.3"/>

  <!-- Disc 2 (mint) -->
  <circle cx="220" cy="280" r="60" fill="url(#disc-mint)" stroke="#17171F" stroke-width="7"/>
  <circle cx="208" cy="264" r="20" fill="white" opacity="0.3"/>

  <!-- Disc 3 (pink) -->
  <circle cx="280" cy="220" r="60" fill="url(#disc-pink)" stroke="#17171F" stroke-width="7"/>
  <circle cx="268" cy="204" r="20" fill="white" opacity="0.3"/>

  <!-- Disc 4 (mint) — top-right -->
  <circle cx="340" cy="160" r="60" fill="url(#disc-mint)" stroke="#17171F" stroke-width="7"/>
  <circle cx="328" cy="144" r="20" fill="white" opacity="0.3"/>
</svg>
